<html>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFuture Expo 2026 - Informações Completas</title>
    </head>

    <body>
        <h1>3 - INSCRIÇÃO NO TECHFUTURE</h1>

        <form>
            <fieldset>
                <legend>Dados Pessoais</legend>
                <label>
                    <mark>Nome:</mark>
                    <input type="text">
                </label>

                <label>
                    <mark>Sobrenome:</mark>
                    <input type="text">
                </label>

                <label>
                    
                    <mark>E-mail</mark>
                    <input type="email">
                </label>

                <label>
                    <mark>CPF</mark>
                    <input type="number">
                </label>

                <label>
                    <mark>Telefone:</mark>
                    <input type="tel">
                </label>

                <label>
                    <mark>Data de nascimento:</mark>
                    <input type="date">
                </label>

                <label>
                    <mark>Senha:</mark>
                    <input type="password">
                </label>

            </fieldset>

            <fieldset>
                <legend>Dados Profissionais</legend>

                <label>
                    <mark>Profissão:</mark>
                    <select>
                        <option>Tecnologia e Inovação</option>
                        <option>Programação</option>
                        <option>Cyber segurança</option>
                        <option>Gestão e Negócios</option>
                    </select>
                </label>

                <label>
                    <mark>Cargo:</mark>
                    <input type="text">
                </label>

                <label>
                    <mark>Empresa:</mark>
                    <input type="text">
                </label>

                <label>
                    <mark>Site da empresa:</mark>
                    <input type="url">
                </label>

                <label>
                    <mark>Horas trabalhadas:</mark>
                    <input type="number">
                </label>

            </fieldset>

            <fieldset>

                <legend>Preferências</legend>
                <p><mark>Escolha os dias de sua preferência</mark></p>

                <label>
                    <input type="checkbox"> Dia 1 - Abertura e IA
                    
                </label>
<br>
                <label>
                    <input type="checkbox"> Dia 2 - Robótica e Web 3.0
                </label>
<br>
                <label>
                    <input type="checkbox"> Dia 3 - Troca de Ideias
                </label>
<br>
                <label>
                    <input type="checkbox"> Dia 4 - Encerramento
                </label>
<br>
<br>
                <p><Mark>Trilhas de Interesse:</Mark></p>
                <label>
                    <input type="checkbox"> Robótica

                </label>
<br>
                <label>
                    <input type="checkbox"> Inteligência Artificial
                </label>
<br>
                <label>
                    <input type="checkbox"> Automação e Máquinas
                </label>
<br>
<br>
                <label>
                    <mark>Alimentação Especial:</mark>
                    <select>
                        <option>Sim</option>
                        <option>Não</option>
                    </select>
                </label>
<br>
<br>
                <label>
                    <mark>Especifique: </mark>
                    <input type="text">
                </label>

            </fieldset>

        </form>

    </body>
</html>
